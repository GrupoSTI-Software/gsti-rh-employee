<!doctype html>
<html lang="es" style="font-size: 14px">
  <head>
    <meta charset="utf-8" />
    <!-- PWA Boot Watchdog: desregistra SW legacy y vigila el arranque de Angular.
         Debe ser el PRIMER script del head. No depende de ngsw ni de Angular. -->
    <script>
      (function () {
        try {
          var RECOVERY_FLAG = 'pwa_boot_recovery_attempted';
          var FIRST_TIMEOUT_MS = 15000;
          var SECOND_TIMEOUT_MS = 10000;
          var isRecoveryAttempt = false;

          try {
            isRecoveryAttempt = sessionStorage.getItem(RECOVERY_FLAG) === '1';
          } catch (e) {
            /* sessionStorage puede fallar en modo privado o iframe; se asume primer intento */
          }

          // 1. Matar de inmediato cualquier SW legacy con 'offline-sw.js' en su scriptURL.
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker
              .getRegistrations()
              .then(function (regs) {
                regs.forEach(function (r) {
                  var url = (r.active && r.active.scriptURL) || '';
                  if (url.indexOf('offline-sw.js') !== -1) {
                    r.unregister();
                  }
                });
              })
              .catch(function () {});

            if ('caches' in window) {
              caches
                .keys()
                .then(function (keys) {
                  keys
                    .filter(function (k) {
                      return k.indexOf('gsti-') === 0;
                    })
                    .forEach(function (k) {
                      caches.delete(k);
                    });
                })
                .catch(function () {});
            }
          }

          // 2. Watchdog de arranque.
          var timeoutMs = isRecoveryAttempt ? SECOND_TIMEOUT_MS : FIRST_TIMEOUT_MS;
          var watchdogId = setTimeout(function () {
            // Si el usuario está sin conexión, un reload no va a ayudar.
            // Saltar directo a la pantalla de error con mensaje accionable.
            var isOffline = typeof navigator !== 'undefined' && navigator.onLine === false;
            if (isRecoveryAttempt || isOffline) {
              showErrorScreen();
            } else {
              hardRecovery();
            }
          }, timeoutMs);

          // 3. Angular cancela el watchdog en ngAfterViewInit.
          window.cancelWatchdog = function () {
            clearTimeout(watchdogId);
            try {
              sessionStorage.removeItem(RECOVERY_FLAG);
            } catch (e) {
              /* ignorar */
            }
          };

          function hardRecovery() {
            try {
              sessionStorage.setItem(RECOVERY_FLAG, '1');
            } catch (e) {
              /* ignorar */
            }

            var tasks = [];
            if ('serviceWorker' in navigator) {
              tasks.push(
                navigator.serviceWorker.getRegistrations().then(function (regs) {
                  return Promise.all(
                    regs.map(function (r) {
                      return r.unregister();
                    }),
                  );
                }),
              );
            }
            if ('caches' in window) {
              tasks.push(
                caches.keys().then(function (keys) {
                  return Promise.all(
                    keys.map(function (k) {
                      return caches.delete(k);
                    }),
                  );
                }),
              );
            }
            Promise.all(tasks)
              .catch(function () {})
              .finally(function () {
                location.reload();
              });
          }

          function showErrorScreen() {
            var splash = document.getElementById('app-splash-screen');
            var error = document.getElementById('app-error-splash');
            if (splash) splash.classList.add('hidden');
            if (error) error.classList.add('visible');
          }
        } catch (e) {
          /* Si el script inline falla, no romper la carga. Degrada al estado pre-fix. */
        }
      })();
    </script>
    <title>GSTI Empleado</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#093057" />
    <meta name="description" content="Aplicación PWA para empleados GSTI" />
    <!-- PWA Installation Priority Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="GSTI" />

    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="GSTI" />

    <!-- Android PWA meta tags -->
    <meta name="screen-orientation" content="portrait" />
    <meta name="x5-orientation" content="portrait" />

    <!-- Microsoft PWA meta tags -->
    <meta name="msapplication-TileColor" content="#093057" />
    <meta name="msapplication-tap-highlight" content="no" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- Manifest estático como fallback. El script inline y BrandingService lo reemplazan
         con uno dinámico que contiene datos del branding del cliente. -->
    <link rel="manifest" href="manifest.webmanifest" />
    <script>
      (function () {
        var apiUrl = localStorage.getItem('pwa_api_url');
        if (!apiUrl) return;

        fetch(apiUrl + '/system-settings-active', { cache: 'no-store' })
          .then(function (r) {
            return r.json();
          })
          .then(function (response) {
            if (!response || !response.data || !response.data.systemSetting) return;

            var s = response.data.systemSetting;
            var tradeName = (s.systemSettingTradeName || '').trim() || 'GSTI';
            var iconUrl =
              (s.systemSettingEmployeeAplicationIcon || '').trim() ||
              (s.systemSettingFavicon || '').trim() ||
              '/assets/gsti/icon.png';
            var logoUrl = (s.systemSettingLogo || '').trim() || '/assets/gsti/adaptive-icon.png';
            var sidebarColor = (s.systemSettingSidebarColor || '').trim() || '093057';

            var manifest = {
              name: tradeName,
              short_name: tradeName.length > 12 ? tradeName.substring(0, 12) : tradeName,
              description: 'Aplicación PWA para empleados de ' + tradeName,
              theme_color: '#' + sidebarColor,
              background_color: '#ffffff',
              display: 'standalone',
              display_override: ['window-controls-overlay', 'standalone'],
              orientation: 'portrait',
              scope: '/',
              start_url: '/',
              icons: [
                { src: iconUrl, sizes: '512x512', type: 'image/png', purpose: 'any' },
                { src: iconUrl, sizes: '192x192', type: 'image/png', purpose: 'any' },
                { src: iconUrl, sizes: '512x512', type: 'image/png', purpose: 'maskable' },
                { src: iconUrl, sizes: '192x192', type: 'image/png', purpose: 'maskable' },
              ],
              categories: ['business', 'productivity'],
              lang: 'es',
              prefer_related_applications: false,
              launch_handler: { client_mode: ['navigate-existing', 'auto'] },
            };

            var existing = document.querySelector('link[rel="manifest"]');
            if (existing) existing.remove();

            var link = document.createElement('link');
            link.rel = 'manifest';
            link.href =
              'data:application/manifest+json,' + encodeURIComponent(JSON.stringify(manifest));
            document.head.appendChild(link);

            // Actualizar meta tags con los datos del branding
            var appNameMeta = document.querySelector('meta[name="application-name"]');
            if (appNameMeta) appNameMeta.setAttribute('content', tradeName);
            var appleTitleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
            if (appleTitleMeta) appleTitleMeta.setAttribute('content', tradeName);
            var themeColorMeta = document.querySelector('meta[name="theme-color"]');
            if (themeColorMeta) themeColorMeta.setAttribute('content', '#' + sidebarColor);
            document.title = tradeName;
          })
          .catch(function () {});
      })();
    </script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      /* Splash Screen / Loader */
      #app-splash-screen {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        z-index: 100000;
        background: var(--bg-primary);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        transition:
          opacity 0.4s ease-out,
          visibility 0.4s ease-out;
      }
      #app-splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }
      #splash-loader {
        width: 48px;
        height: 48px;
        border: 4px solid var(--primary);
        border-top-color: var(--text-tertiary);
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* No Connection Overlay */
      #no-connection-splash {
        display: none;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        z-index: 99999;
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #no-connection-splash.visible {
        display: flex;
      }
      #no-connection-card {
        background: #ffffff;
        border-radius: 0;
        padding: 2rem;
        width: 100%;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        animation: nc-slide-up 0.4s ease-out;
      }
      #no-connection-icon-wrap {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(239, 68, 68, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: nc-pulse 2s ease-in-out infinite;
      }
      #no-connection-title {
        font-size: 1.25rem;
        font-weight: 700;
        color: #111827;
        margin: 0;
        text-align: center;
      }
      #no-connection-msg {
        font-size: 0.9rem;
        color: #6b7280;
        margin: 0;
        text-align: center;
        line-height: 1.6;
      }
      #no-connection-btn {
        width: 100%;
        padding: 0.875rem;
        background: #093057;
        color: white;
        border: none;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition:
          background 0.2s ease,
          transform 0.15s ease;
      }
      #no-connection-btn:active {
        transform: scale(0.98);
      }
      #no-connection-btn:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      #no-connection-spinner {
        display: none;
        width: 18px;
        height: 18px;
        border: 3px solid rgba(255, 255, 255, 0.35);
        border-top-color: white;
        border-radius: 50%;
        animation: nc-spin 0.8s linear infinite;
      }
      @keyframes nc-slide-up {
        from {
          opacity: 0;
          transform: translateY(28px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes nc-pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.06);
        }
      }
      @keyframes nc-spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* App Error Overlay: mostrado por el watchdog de arranque */
      #app-error-splash {
        display: none;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        z-index: 99998;
        background: #ffffff;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #app-error-splash.visible {
        display: flex;
      }
      #app-error-card {
        max-width: 360px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
      }
      #app-error-icon-wrap {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(239, 158, 68, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #app-error-title {
        font-size: 1.25rem;
        font-weight: 700;
        color: #111827;
        margin: 0;
        text-align: center;
      }
      #app-error-msg {
        font-size: 0.9rem;
        color: #6b7280;
        margin: 0;
        text-align: center;
        line-height: 1.6;
      }
      #app-error-btn {
        width: 100%;
        min-height: 44px;
        padding: 0.875rem;
        background: #093057;
        color: white;
        border: none;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          background 0.2s ease,
          transform 0.15s ease;
      }
      #app-error-btn:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen / Loader inicial -->
    <div id="app-splash-screen">
      <div id="splash-loader"></div>
    </div>

    <!-- Overlay de sin conexión: visible antes de que Angular cargue -->
    <div id="no-connection-splash">
      <div id="no-connection-card">
        <div id="no-connection-icon-wrap">
          <svg
            width="44"
            height="44"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M1 1L23 23" stroke="#ef4444" stroke-width="2" stroke-linecap="round" />
            <path
              d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.8M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"
              stroke="#ef4444"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <h2 id="no-connection-title">Sin Conexión a Internet</h2>
        <p id="no-connection-msg">
          No se pudo establecer conexión con el servidor. Por favor, verifica tu conexión a internet
          e intenta nuevamente.
        </p>
        <button id="no-connection-btn" type="button" onclick="retryConnection()">
          <span id="no-connection-spinner"></span>
          <span id="no-connection-btn-text">Reintentar</span>
        </button>
      </div>
    </div>

    <!-- App Error Overlay: mostrado por el watchdog cuando Angular no arranca tras recovery -->
    <div id="app-error-splash">
      <div id="app-error-card">
        <div id="app-error-icon-wrap">
          <svg
            width="44"
            height="44"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M12 9V13M12 17H12.01M10.29 3.86L1.82 18A2 2 0 0 0 3.53 21H20.47A2 2 0 0 0 22.18 18L13.71 3.86A2 2 0 0 0 10.29 3.86Z"
              stroke="#ef9e44"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <h2 id="app-error-title">No pudimos abrir la aplicación</h2>
        <p id="app-error-msg">
          Cierra la app e intenta de nuevo. Si persiste, revisa tu conexión a internet.
        </p>
        <button id="app-error-btn" type="button" onclick="window.location.reload()">
          Reintentar
        </button>
      </div>
    </div>

    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>

    <script>
      var _ncSplash = document.getElementById('no-connection-splash');
      var _ncBtn = document.getElementById('no-connection-btn');
      var _ncSpinner = document.getElementById('no-connection-spinner');
      var _ncBtnText = document.getElementById('no-connection-btn-text');

      function showNoConnection() {
        _ncSplash.classList.add('visible');
      }

      function hideNoConnection() {
        _ncSplash.classList.remove('visible');
      }

      function retryConnection() {
        _ncBtn.disabled = true;
        _ncSpinner.style.display = 'block';
        _ncBtnText.textContent = 'Reintentando...';

        fetch('/assets/i18n/es.json?t=' + Date.now(), { method: 'HEAD', cache: 'no-cache' })
          .then(function (r) {
            if (r.ok) {
              hideNoConnection();
              window.location.reload();
            } else {
              resetBtn();
            }
          })
          .catch(function () {
            resetBtn();
          });
      }

      function resetBtn() {
        _ncBtn.disabled = false;
        _ncSpinner.style.display = 'none';
        _ncBtnText.textContent = 'Reintentar';
      }

      // Mostrar overlay si no hay conexión al cargar
      if (typeof navigator !== 'undefined' && !navigator.onLine) {
        showNoConnection();
      }

      window.addEventListener('offline', showNoConnection);
      window.addEventListener('online', hideNoConnection);

      // Función global para ocultar el splash screen (llamada desde Angular)
      window.hideSplashScreen = function () {
        var splash = document.getElementById('app-splash-screen');
        if (splash) {
          splash.classList.add('hidden');
          // Remover del DOM después de la transición
          setTimeout(function () {
            if (splash.parentNode) {
              splash.parentNode.removeChild(splash);
            }
          }, 400);
        }
      };
    </script>
  </body>
</html>
