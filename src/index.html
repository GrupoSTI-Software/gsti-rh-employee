<!doctype html>
<html lang="es" style="font-size: 14px">
  <head>
    <meta charset="utf-8" />
    <title>GSTI Empleado</title>
    <base href="/" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#093057" />
    <meta name="description" content="Aplicación PWA para empleados GSTI" />
    <!-- Inyección temprana del manifest dinámico desde localStorage.
         Este script corre ANTES de Angular y ANTES de que Chrome evalúe el manifest
         para el diálogo de instalación (beforeinstallprompt) en Android.
         BrandingService guarda el manifest en localStorage en cada sesión,
         así que desde la segunda visita Chrome siempre lee el nombre e ícono correctos. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('pwa_dynamic_manifest');
          if (stored) {
            var manifestDataUrl = 'data:application/manifest+json,' + encodeURIComponent(stored);
            var link = document.createElement('link');
            link.rel = 'manifest';
            link.href = manifestDataUrl;
            document.head.appendChild(link);
          }
        } catch (e) { /* silencioso */ }
      })();
    </script>

    <!-- PWA Installation Priority Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="GSTI Empleado" />
    
    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="GSTI PWA" />
    
    <!-- Android PWA meta tags -->
    <meta name="screen-orientation" content="portrait" />
    <meta name="x5-orientation" content="portrait" />
    
    <!-- Microsoft PWA meta tags -->
    <meta name="msapplication-TileColor" content="#093057" />
    <meta name="msapplication-tap-highlight" content="no" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="manifest" href="manifest.webmanifest" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      /* Splash Screen / Loader */
      #app-splash-screen {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        z-index: 100000;
        background: var(--bg-primary);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        transition:
          opacity 0.4s ease-out,
          visibility 0.4s ease-out;
      }
      #app-splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }
      #splash-loader {
        width: 48px;
        height: 48px;
        border: 4px solid var(--primary);
        border-top-color: var(--text-tertiary);
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* No Connection Overlay */
      #no-connection-splash {
        display: none;
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        min-height: 100dvh;
        z-index: 99999;
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #no-connection-splash.visible {
        display: flex;
      }
      #no-connection-card {
        background: #ffffff;
        border-radius: 0;
        padding: 2rem;
        width: 100%;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        animation: nc-slide-up 0.4s ease-out;
      }
      #no-connection-icon-wrap {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(239, 68, 68, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: nc-pulse 2s ease-in-out infinite;
      }
      #no-connection-title {
        font-size: 1.25rem;
        font-weight: 700;
        color: #111827;
        margin: 0;
        text-align: center;
      }
      #no-connection-msg {
        font-size: 0.9rem;
        color: #6b7280;
        margin: 0;
        text-align: center;
        line-height: 1.6;
      }
      #no-connection-btn {
        width: 100%;
        padding: 0.875rem;
        background: #093057;
        color: white;
        border: none;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition:
          background 0.2s ease,
          transform 0.15s ease;
      }
      #no-connection-btn:active {
        transform: scale(0.98);
      }
      #no-connection-btn:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      #no-connection-spinner {
        display: none;
        width: 18px;
        height: 18px;
        border: 3px solid rgba(255, 255, 255, 0.35);
        border-top-color: white;
        border-radius: 50%;
        animation: nc-spin 0.8s linear infinite;
      }
      @keyframes nc-slide-up {
        from {
          opacity: 0;
          transform: translateY(28px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes nc-pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.06);
        }
      }
      @keyframes nc-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen / Loader inicial -->
    <div id="app-splash-screen">
      <div id="splash-loader"></div>
    </div>

    <!-- Overlay de sin conexión: visible antes de que Angular cargue -->
    <div id="no-connection-splash">
      <div id="no-connection-card">
        <div id="no-connection-icon-wrap">
          <svg
            width="44"
            height="44"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M1 1L23 23" stroke="#ef4444" stroke-width="2" stroke-linecap="round" />
            <path
              d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.8M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"
              stroke="#ef4444"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <h2 id="no-connection-title">Sin Conexión a Internet</h2>
        <p id="no-connection-msg">
          No se pudo establecer conexión con el servidor. Por favor, verifica tu conexión a internet
          e intenta nuevamente.
        </p>
        <button id="no-connection-btn" type="button" onclick="retryConnection()">
          <span id="no-connection-spinner"></span>
          <span id="no-connection-btn-text">Reintentar</span>
        </button>
      </div>
    </div>

    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>

    <script>
      var _ncSplash = document.getElementById('no-connection-splash');
      var _ncBtn = document.getElementById('no-connection-btn');
      var _ncSpinner = document.getElementById('no-connection-spinner');
      var _ncBtnText = document.getElementById('no-connection-btn-text');

      function showNoConnection() {
        _ncSplash.classList.add('visible');
      }

      function hideNoConnection() {
        _ncSplash.classList.remove('visible');
      }

      function retryConnection() {
        _ncBtn.disabled = true;
        _ncSpinner.style.display = 'block';
        _ncBtnText.textContent = 'Reintentando...';

        fetch('/assets/i18n/es.json?t=' + Date.now(), { method: 'HEAD', cache: 'no-cache' })
          .then(function (r) {
            if (r.ok) {
              hideNoConnection();
              window.location.reload();
            } else {
              resetBtn();
            }
          })
          .catch(function () {
            resetBtn();
          });
      }

      function resetBtn() {
        _ncBtn.disabled = false;
        _ncSpinner.style.display = 'none';
        _ncBtnText.textContent = 'Reintentar';
      }

      // Mostrar overlay si no hay conexión al cargar
      if (typeof navigator !== 'undefined' && !navigator.onLine) {
        showNoConnection();
      }

      window.addEventListener('offline', showNoConnection);
      window.addEventListener('online', hideNoConnection);

      // Registrar el Service Worker offline inmediatamente (sin esperar a Angular)
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/offline-sw.js', { scope: '/' }).catch(function () {
          /* silencioso si falla */
        });
      }

      // Función global para ocultar el splash screen (llamada desde Angular)
      window.hideSplashScreen = function () {
        var splash = document.getElementById('app-splash-screen');
        if (splash) {
          splash.classList.add('hidden');
          // Remover del DOM después de la transición
          setTimeout(function () {
            if (splash.parentNode) {
              splash.parentNode.removeChild(splash);
            }
          }, 400);
        }
      };
    </script>
  </body>
</html>
