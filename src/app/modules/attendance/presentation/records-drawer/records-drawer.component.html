<app-drawer [(visible)]="visible" [title]="title" [cancelButtonText]="cancelButtonText" [enableSwipe]="true"
  (closed)="close()">
  <!-- Contenido de registros -->
  <div class="records-list">
    @if (records.length === 0) {
    <div class="no-records">
      <i class="pi pi-info-circle"></i>
      <p>{{ 'attendance.noRecords' | translate }}</p>
    </div>
    } @else {
    @for (record of records; track record.assistId) {
    <div class="record-item">
      <div class="record-header">
        <div class="record-time">
          <i class="pi pi-clock"></i>
          <span class="time-value">{{ formatRecordTime(record.assistPunchTime) }}</span>
        </div>
        <span class="record-date">{{ formatRecordDateTime(record.assistPunchTime) }}</span>
      </div>
    </div>
    }
    }
  </div>
</app-drawer>
