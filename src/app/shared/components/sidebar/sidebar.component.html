@if (isOpen) {
  <div class="sidebar-overlay" (click)="close()" [@fadeIn]></div>
  <aside class="sidebar" [@slideInOut]>
    <div class="sidebar-header">
      <button type="button" class="close-button" (click)="close()" [attr.aria-label]="'common.close' | translate">
        <i class="pi pi-times"></i>
      </button>

      <div class="user-info">
        <div class="user-avatar">
          {{ userInitials() }}
        </div>
        <h3 class="user-name">{{ userName() }}</h3>
        <p class="user-email">{{ userEmail() }}</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <ul class="menu-list">
        @for (item of menuItems; track item.route) {
          <li>
            <a
              [routerLink]="[item.route]"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: false }"
              (click)="navigate(item.route)"
              class="menu-item"
            >
              <i [class]="'pi ' + item.icon"></i>
              <span>{{ item.translationKey | translate }}</span>
            </a>
          </li>
        }
      </ul>
    </nav>

    <div class="sidebar-footer">
      <button type="button" class="logout-button" (click)="logout()">
        <i class="pi pi-sign-out"></i>
        <span>{{ 'common.logout' | translate }}</span>
      </button>
    </div>
  </aside>
}
