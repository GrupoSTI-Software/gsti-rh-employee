@if (isOpen) {
  <div
    class="sidebar-overlay"
    (click)="close()"
    (keydown.escape)="close()"
    role="button"
    tabindex="0"
    [@fadeIn]
  ></div>
  <aside class="sidebar" [@slideInOut]>
    <div class="sidebar-header">
      <button
        type="button"
        class="close-button"
        (click)="close()"
        [attr.aria-label]="'menu.close' | translate"
      >
        <i class="pi pi-times"></i>
      </button>

      <div class="user-info">
        <app-avatar size="large" [showBorder]="true" />
        <h3 class="user-name">{{ userName() }}</h3>
        <p class="user-email">{{ userEmail() }}</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <ul class="menu-list">
        @for (item of menuItems; track item.route) {
          <li>
            <a
              [routerLink]="[item.route]"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: false }"
              (click)="navigate(item.route)"
              class="menu-item"
            >
              <i [class]="'pi ' + item.icon"></i>
              <span>{{ item.translationKey | translate }}</span>
              @if (item.badgeCount && item.badgeCount() > 0) {
                <span 
                  class="menu-badge" 
                  [class.single-digit]="item.badgeCount() < 10"
                  [attr.data-count]="item.badgeCount()"
                >
                  {{ item.badgeCount() }}
                </span>
              }
            </a>
          </li>
        }
      </ul>
    </nav>

    <div class="sidebar-footer">
      <button type="button" class="logout-button" (click)="logout()">
        <i class="pi pi-sign-out"></i>
        <span>{{ 'menu.logout' | translate }}</span>
      </button>
    </div>
  </aside>
}
