<header class="header">
  <button type="button" class="menu-button" (click)="toggleSidebar()" [attr.aria-label]="'common.menu' | translate">
    <i class="pi pi-bars"></i>
  </button>

  <div class="logo-container">
    @if (showLogo()) {
      <img [src]="logoUrl()" [alt]="'common.appName' | translate" class="logo" />
    } @else {
      <div class="logo-placeholder">
        <i class="pi pi-spin pi-spinner"></i>
      </div>
    }
  </div>

  <div class="user-info">
    <span class="user-name">{{ userName() }}</span>
    <button type="button" class="logout-button" (click)="logout()" [attr.aria-label]="'common.logout' | translate">
      <i class="pi pi-sign-out"></i>
    </button>
  </div>
</header>
